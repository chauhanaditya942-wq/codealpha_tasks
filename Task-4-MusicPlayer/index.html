<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wavelength Music Player</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="player">
    <div class="album-art" id="albumArt">
      <div class="vinyl"></div>
    </div>
    <div class="song-info">
      <h2 id="songTitle">Stellar Drift</h2>
      <p id="songArtist">Cosmic Waves</p>
    </div>
    <div class="progress-container">
      <span id="currentTime">0:00</span>
      <div class="progress-bar" id="progressBar">
        <div class="progress" id="progress"></div>
      </div>
      <span id="duration">0:00</span>
    </div>
    <div class="controls">
      <button id="prevBtn" class="control-btn" title="Previous">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/>
        </svg>
      </button>
      <button id="playBtn" class="control-btn play-btn" title="Play">
        <svg viewBox="0 0 24 24" width="32" height="32">
          <path d="M8 5v14l11-7z"/>
        </svg>
      </button>
      <button id="nextBtn" class="control-btn" title="Next">
        <svg viewBox="0 0 24 24" width="24" height="24">
          <path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/>
        </svg>
      </button>
    </div>
    <div class="volume-container">
      <button id="muteBtn" class="volume-icon" title="Mute">
        <svg viewBox="0 0 24 24" width="18" height="18">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/>
        </svg>
      </button>
      <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.7" />
    </div>
    <div class="extras">
      <button id="playlistToggle" class="extra-btn">🎵 Playlist</button>
      <label class="autoplay-label">
        <input type="checkbox" id="autoplayCheckbox" />
        Autoplay
      </label>
    </div>
    <div class="playlist" id="playlist">
      <!-- dynamically populated -->
    </div>
    <div class="equalizer" id="equalizer">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
